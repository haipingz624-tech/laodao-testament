        text: `你直接带着材料去找现任女友。她住在老刀生前租的江景公寓里，开门时穿着睡衣，手里还拿着那台Mate 70 Pro。

你把监控录像拍在桌上。她看了一眼，没有惊慌，反而笑了。

"陈律，你知道老刀为什么选我吗？"她坐在沙发上，"不是因为漂亮。是因为我跟他一样，都是从小地方来上海的人。我们都不相信法律，我们只相信合同。但你猜怎么着？合同是他签的，遗嘱也是我让他签的——在他还活着的时候。"

她调出一段视频。10月14日，老刀坐在轮椅上，神志清醒，对着镜头说："我自愿将我的数字人格使用权，在我死后，授予我的女友张薇薇女士。"

"深瞳的实验需要我的授权，"她说，"我给了。NFT遗嘱需要他的生物特征，我取了。他10月23日死的时候，我就在旁边。我没有报警，因为报警就意味着实验终止，就意味着那份授权作废。我让他'活'到了11月15日，只是为了等那份NFT的法律确认。我犯法了吗？也许吧。但我履行了他的意愿。"

你看着她的眼睛，意识到这个案子里最可怕的不是技术，不是公司，是普通人的贪婪与爱的混合物。

你最终没有把她送进监狱。你跟她做了一笔交易：你帮她把NFT遗嘱的法律效力最大化，她给你深瞳实验数据的10%分成。你们赢了。老刀被"合法地"移交给了她，作为私人数字财产。

三年后，你在短视频平台上看到了"老刀"的复出直播。他还是在骂游戏，但偶尔会插入一段软广。评论区有人说："感觉老刀变了。"你关掉手机，没有评论。

你赢了官司，但输掉了那个在凌晨三点骂游戏的诗人。`,
        choices: [
            {text: "返回标题画面", next: "start", action: "restart"}
        ]
    },

    chaos1: {
        title: "混战乱局",
        isEnding: true,
        endingId: "ruins",
        endingName: "废墟",
        text: `你把"林薇持有关键碎片"的情报精准泄露给郑铎和现任女友，让他们去逼林薇现身。

局势如你所料地恶化。郑铎动用黑道关系找到了林薇在大理的住处，派了两个人去"请"她。现任女友则在社交媒体上发起了一场针对林薇的网络暴力，指控她"觊觎前夫遗产，不惜伪造证据"。

林薇没有屈服。她做了一件所有人都没想到的事：她把母带密钥公开上传到了某个学术共享平台，标题是《关于刘刀鸣数字人格原始训练数据的公开声明》。文件附带的不是密钥本身，而是一段声明——"任何试图独占老刀的人，都将得到一片废墟。"

密钥被下载了四十七万次，但没有人能用。因为林薇在上传前，用一段不可逆的混淆算法把它毁了。母带还在，但密钥的数学结构已经被破坏，就像一把被熔化的钥匙。

四方当事人同时失去了开启遗言的可能。递归猫在GitHub上发布了一个空项目，名字叫" LaoDao_Ruin "。README里只有一句话："她毁了钥匙，但保住了锁。"

法院最终裁定：由于核心证据灭失，本案终止审理。老刀的数字人格被认定为"无法解析的数据遗产"，由国家信息中心永久冷存储。

你躲在暗处，等到了三方精疲力竭的时刻，以"唯一同时代理过两方利益的律师"身份出来收拾残局。但你发现，已经没有什么残局可收拾了。所有人都输了，包括你。

你后来去了大理，在洱海边找到了林薇。她开了一家小茶馆，门口种着一棵银杏树。你问她后不后悔。

她说："我后悔的不是毁了密钥。我后悔的是，我花了十五年教他怎么爱一个人，最后他却把自己变成了一段代码，让我连恨他的对象都找不到。"

你喝完了那杯茶，再也没有接过数字遗产的案子。`,
        choices: [
            {text: "返回标题画面", next: "start", action: "restart"}
        ]
    }
};

let currentScene = 'start';
let historyLog = [];
let isTyping = false;
let typingTimer = null;
let currentText = '';
let currentIndex = 0;
let typewriterEnabled = true;
const MAX_SLOTS = 3;

function initGame() {
    loadTheme();
    const savedTypewriter = localStorage.getItem('traced_code_typewriter');
    if (savedTypewriter !== null) {
        typewriterEnabled = savedTypewriter === '1';
    }
    updateStartScreen();
    const autoSave = localStorage.getItem('traced_code_autosave');
    if (autoSave) {
        const data = JSON.parse(autoSave);
        if (confirm('检测到自动存档，是否继续上次的游戏？')) {
            loadGameData(data);
            document.getElementById('start-screen').classList.add('hidden');
            return;
        }
    }
}

function updateStartScreen() {
    const first = isFirstClear();
    const second = isSecondClear();
    const btn = document.getElementById('btn-endings');
    const hint = document.getElementById('start-clear-hint');
    const firstHint = document.getElementById('first-run-hint');
    const twBtn = document.getElementById('btn-typewriter');
    if (twBtn) twBtn.textContent = `打字机效果：${typewriterEnabled ? '开' : '关'}`;
    if (first) {
        btn.disabled = false;
        firstHint.textContent = "";
        if (second) {
            hint.textContent = "二周目已通关 | 全结局回顾已开放";
        } else {
            hint.textContent = "一周目已通关 | 结局回顾已开放（条件查看）";
        }
    } else {
        btn.disabled = true;
        hint.textContent = "首次通关后开放结局回顾";
        firstHint.textContent = "一周目开局仅开放 A 路线，通关后解锁全部选项";
    }
}

function toggleTypewriter() {
    typewriterEnabled = !typewriterEnabled;
    localStorage.setItem('traced_code_typewriter', typewriterEnabled ? '1' : '0');
    updateStartScreen();
    showToast(`打字机效果：${typewriterEnabled ? '开' : '关'}`);
}

function startGame() {
    document.getElementById('start-screen').classList.add('hidden');
    renderScene('start');
}

function renderScene(sceneId, skipHistory = false) {
    currentScene = sceneId;
    const scene = gameData[sceneId];
    if (!scene) return;
    const display = document.getElementById('main-display');
    const choicesArea = document.getElementById('choices-area');

    if (!skipHistory && (sceneId !== 'start' || historyLog.length > 0)) {
        historyLog.push({ scene: scene, choice: null });
    }

    const sceneBlock = document.createElement('div');
    sceneBlock.className = 'scene-block current-scene';
    sceneBlock.id = 'current-block';

    let headerHTML = '';
    if (scene.title) {
        headerHTML = `<div class="scene-header">${scene.title}</div>`;
    }

    let endingHTML = '';
    if (scene.isEnding) {
        endingHTML = `<div style="text-align:center;margin-bottom:16px;"><span class="ending-badge">结局解锁：${scene.endingName}</span></div>`;
    }

    sceneBlock.innerHTML = headerHTML + endingHTML + `<div class="scene-text" id="typing-text"></div>`;
    display.appendChild(sceneBlock);

    startTyping(scene.text, () => {
        showChoices(scene.choices);
        if (scene.isEnding) {
            checkAndUnlockEnding(sceneId);
        }
    });

    autoSave();
}

function startTyping(text, callback) {
    currentText = text;
    const el = document.getElementById('typing-text');

    if (!typewriterEnabled) {
        isTyping = false;
        if (el) el.innerHTML = text.replace(/\n/g, '<br>');
        if (callback) callback();
        return;
    }

    isTyping = true;
    currentIndex = 0;
    el.innerHTML = '<span class="typing-cursor"></span>';

    typingTimer = setInterval(() => {
        if (currentIndex < currentText.length) {
            let char = currentText[currentIndex];
            if (char === '\n') char = '<br>';
            el.innerHTML = currentText.substring(0, currentIndex + 1).replace(/\n/g, '<br>') + '<span class="typing-cursor"></span>';
            currentIndex++;
            const display = document.getElementById('main-display');
            display.scrollTop = display.scrollHeight;
        } else {
            clearInterval(typingTimer);
            isTyping = false;
            el.innerHTML = currentText.replace(/\n/g, '<br>');
            if (callback) callback();
        }
    }, 30);
}

function showChoices(choices) {
    const area = document.getElementById('choices-area');
    area.innerHTML = '';

    if (!choices || choices.length === 0) return;

    let effectiveChoices = choices;
    if (currentScene === 'start' && !isFirstClear()) {
        effectiveChoices = [choices[0]];
    }

    effectiveChoices.forEach((choice, idx) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        if (choice.danger) btn.classList.add('danger');

        const prefix = String.fromCharCode(65 + idx);
        btn.innerHTML = `<span class="choice-prefix">${prefix}.</span>${choice.text}`;

        btn.onclick = () => makeChoice(choice, prefix);
        area.appendChild(btn);
    });

    const currentBlock = document.getElementById('current-block');
    if (currentBlock) {
        currentBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

function makeChoice(choice, prefix) {
    if (isTyping) {
        clearInterval(typingTimer);
        const el = document.getElementById('typing-text');
        if (el) el.innerHTML = currentText.replace(/\n/g, '<br>');
        isTyping = false;
    }

    if (historyLog.length > 0) {
        historyLog[historyLog.length - 1].choice = prefix + '. ' + choice.text;
    }

    const display = document.getElementById('main-display');
    const record = document.createElement('div');
    record.className = 'choice-record';
    record.textContent = `>>> 选择：${prefix}. ${choice.text}`;
    display.appendChild(record);

    const current = document.getElementById('current-block');
    if (current) current.classList.remove('current-scene');

    document.getElementById('choices-area').innerHTML = '';

    const divider = document.createElement('div');
    divider.className = 'divider';
    divider.textContent = '◆ ◆ ◆';
    display.appendChild(divider);

    if (choice.action === 'restart') {
        historyLog = [];
        currentScene = 'start';
        document.getElementById('main-display').innerHTML = '';
        document.getElementById('start-screen').classList.remove('hidden');
        updateStartScreen();
        return;
    }

    setTimeout(() => {
        renderScene(choice.next);
    }, 400);
}

function checkAndUnlockEnding(sceneId) {
    const scene = gameData[sceneId];
    if (!scene || !scene.isEnding) return;

    let endingId = scene.endingId;
    if (!endingId) {
        for (let [eid, cfg] of Object.entries(endingsConfig)) {
            if (cfg.sceneId === sceneId) { endingId = eid; break; }
        }
    }
    if (!endingId) return;

    const unlocked = JSON.parse(localStorage.getItem('traced_code_endings') || '{}');
    const wasNew = !unlocked[endingId];
    unlocked[endingId] = unlocked[endingId] || Date.now();
    localStorage.setItem('traced_code_endings', JSON.stringify(unlocked));

    const clearCount = parseInt(localStorage.getItem('traced_code_clear_count') || '0');
    const newCount = clearCount + 1;
    localStorage.setItem('traced_code_clear_count', String(newCount));

    if (newCount === 1) {
        localStorage.setItem('traced_code_first_clear', Date.now());
        setTimeout(() => showToast("一周目通关！结局回顾已开放，二周目可解锁全部开局选项。"), 800);
    } else if (newCount === 2) {
        localStorage.setItem('traced_code_second_clear', Date.now());
        setTimeout(() => showToast("二周目通关！所有结局全文已开放。"), 800);
    } else if (wasNew) {
        const total = Object.keys(endingsConfig).length;
        const got = Object.keys(unlocked).length;
        setTimeout(() => showToast(`新结局解锁！ (${got}/${total})`), 800);
    }
    
    updateStartScreen();
}

function getUnlockedEndings() {
    return JSON.parse(localStorage.getItem('traced_code_endings') || '{}');
}

function isFirstClear() {
    return !!localStorage.getItem('traced_code_first_clear');
}

function isSecondClear() {
    return !!localStorage.getItem('traced_code_second_clear');
}

function openEndingsFromStart() {
    document.getElementById('start-screen').classList.add('hidden');
    openMenu('endings');
}

function renderEndingsGallery(container) {
    container.innerHTML = '';
    
    if (!isFirstClear()) {
        container.innerHTML = `
            <div class="endings-locked-msg">
                <div style="font-size:24px;margin-bottom:12px;">🔒</div>
                <div>通关一周目后开放结局回顾</div>
            </div>
        `;
        return;
    }

    const unlocked = getUnlockedEndings();
    const total = Object.keys(endingsConfig).length;
    const got = Object.keys(unlocked).length;
    const second = isSecondClear();

    const stats = document.createElement('div');
    stats.className = 'endings-stats';
    stats.innerHTML = `已亲历 <span class="highlight">${got}</span> / ${total} 个结局`;
    container.appendChild(stats);

    for (let [eid, cfg] of Object.entries(endingsConfig)) {
        const isUnlocked = !!unlocked[eid];
        const card = document.createElement('div');
        card.className = 'ending-card' + (isUnlocked ? ' unlocked' : '');

        const header = document.createElement('div');
        header.className = 'ending-card-header';
        header.innerHTML = `
            <div class="ending-card-title">${isUnlocked ? cfg.title : '???'}</div>
            <div class="ending-card-status">${isUnlocked ? '已亲历' : '未解锁'}</div>
        `;
        
        const body = document.createElement('div');
        body.className = 'ending-card-body';
        
        let bodyHTML = '';
        if (isUnlocked || isFirstClear()) {
            bodyHTML += `<div class="ending-condition"><strong>达成条件：</strong>${cfg.condition}</div>`;
        }
        
        if (second) {
            const scene = gameData[cfg.sceneId];
            if (scene) {
                bodyHTML += `<div class="ending-content-text">${scene.text}</div>`;
            }
        } else {
            bodyHTML += `<div class="ending-content-locked">完成二周目后开放全文</div>`;
        }
        
        body.innerHTML = bodyHTML;
        
        header.onclick = () => {
            const wasExpanded = body.classList.contains('expanded');
            document.querySelectorAll('.ending-card-body').forEach(b => b.classList.remove('expanded'));
            if (!wasExpanded) {
                body.classList.add('expanded');
            }
        };
        
        card.appendChild(header);
        card.appendChild(body);
        container.appendChild(card);
    }
}

function openMenu(type) {
    const overlay = document.getElementById('menu-overlay');
    const title = document.getElementById('menu-title');
    const content = document.getElementById('menu-content');
    overlay.classList.add('active');

    if (type === 'save') {
        title.textContent = '存档';
        renderSaveSlots(content, 'save');
    } else if (type === 'load') {
        title.textContent = '读档';
        renderSaveSlots(content, 'load');
    } else if (type === 'history') {
        title.textContent = '历史记录';
        renderHistory(content);
    } else if (type === 'endings') {
        title.textContent = '结局回顾';
        renderEndingsGallery(content);
    }
}

function closeMenu(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('menu-overlay').classList.remove('active');
    // 若游戏尚未开始（仍在首页），关闭菜单后恢复首页
    if (historyLog.length === 0 && document.getElementById('main-display').innerHTML.trim() === '') {
        document.getElementById('start-screen').classList.remove('hidden');
    }
}

function renderSaveSlots(container, mode) {
    container.innerHTML = '';
    for (let i = 1; i <= MAX_SLOTS; i++) {
        const key = `traced_code_save_${i}`;
        const data = localStorage.getItem(key);
        const slot = document.createElement('div');
        slot.className = 'save-slot';

        let info = '空档位';
        let time = '';
        if (data) {
            const parsed = JSON.parse(data);
            const scene = gameData[parsed.scene];
            info = scene ? (scene.endingName || scene.title || parsed.scene) : parsed.scene;
            time = new Date(parsed.time).toLocaleString();
        }

        slot.innerHTML = `
            <div>
                <div style="font-weight:bold;margin-bottom:4px;">档位 ${i}</div>
                <div class="save-info">${info} ${time ? '| ' + time : ''}</div>
            </div>
        `;

        const btn = document.createElement('button');
        btn.className = 'save-btn';
        btn.textContent = mode === 'save' ? '存档' : '读档';
        btn.onclick = () => {
            if (mode === 'save') {
                doSave(i);
            } else {
                doLoad(i);
            }
        };
        slot.appendChild(btn);
        container.appendChild(slot);
    }
}

function doSave(slotIndex) {
    const data = {
        scene: currentScene,
        history: historyLog,
        time: Date.now()
    };
    localStorage.setItem(`traced_code_save_${slotIndex}`, JSON.stringify(data));
    showToast(`已保存到档位 ${slotIndex}`);
    openMenu('save');
}

function doLoad(slotIndex) {
    const data = localStorage.getItem(`traced_code_save_${slotIndex}`);
    if (!data) {
        showToast('该档位为空');
        return;
    }
    loadGameData(JSON.parse(data));
    closeMenu();
    showToast('读档成功');
}

function loadGameData(data) {
    historyLog = data.history || [];
    document.getElementById('main-display').innerHTML = '';
    historyLog.forEach(entry => {
        const block = document.createElement('div');
        block.className = 'scene-block';
        if (entry.scene.title) {
            block.innerHTML += `<div class="scene-header">${entry.scene.title}</div>`;
        }
        block.innerHTML += `<div class="scene-text">${entry.scene.text.replace(/\n/g, '<br>')}</div>`;
        document.getElementById('main-display').appendChild(block);

        if (entry.choice) {
            const rec = document.createElement('div');
            rec.className = 'choice-record';
            rec.textContent = `>>> 选择：${entry.choice}`;
            document.getElementById('main-display').appendChild(rec);
        }

        const div = document.createElement('div');
        div.className = 'divider';
        div.textContent = '◆ ◆ ◆';
        document.getElementById('main-display').appendChild(div);
    });

    renderScene(data.scene, true);
    document.getElementById('start-screen').classList.add('hidden');
}

function autoSave() {
    const data = {
        scene: currentScene,
        history: historyLog,
        time: Date.now()
    };
    localStorage.setItem('traced_code_autosave', JSON.stringify(data));
}

function renderHistory(container) {
    container.innerHTML = '';
    if (historyLog.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:20px;">暂无历史记录</div>';
        return;
    }

    historyLog.forEach((entry, idx) => {
        const div = document.createElement('div');
        div.className = 'history-entry';
        const scene = entry.scene;
        div.innerHTML = `
            <div class="history-label">第 ${idx + 1} 幕 · ${scene.title || '无标题'}</div>
            <div style="font-size:13px;color:var(--text-dim);margin-top:4px;">${scene.text.substring(0, 60)}...</div>
            ${entry.choice ? `<div style="font-size:12px;color:var(--accent);margin-top:6px;">${entry.choice}</div>` : ''}
        `;
        container.appendChild(div);
    });
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

function toggleTheme() {
    const current = document.body.getAttribute('data-theme');
    const next = current === 'light' ? 'dark' : 'light';
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('traced_code_theme', next);
}

function loadTheme() {
    const saved = localStorage.getItem('traced_code_theme') || 'dark';
    document.body.setAttribute('data-theme', saved);
}

document.getElementById('start-screen').addEventListener('click', function(e) {
    if (e.target === this) startGame();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closeMenu();
    }
    if (isTyping && (e.key === 'Enter' || e.key === ' ')) {
        e.preventDefault();
        clearInterval(typingTimer);
        const el = document.getElementById('typing-text');
        if (el) el.innerHTML = currentText.replace(/\n/g, '<br>');
        isTyping = false;
        const scene = gameData[currentScene];
        if (scene && scene.choices) showChoices(scene.choices);
        if (scene && scene.isEnding) checkAndUnlockEnding(currentScene);
    }
});

// 移动端：点击文字区域跳过打字机
document.getElementById('main-display').addEventListener('click', (e) => {
    if (isTyping) {
        e.stopPropagation();
        clearInterval(typingTimer);
        const el = document.getElementById('typing-text');
        if (el) el.innerHTML = currentText.replace(/\n/g, '<br>');
        isTyping = false;
        const scene = gameData[currentScene];
        if (scene && scene.choices) showChoices(scene.choices);
        if (scene && scene.isEnding) checkAndUnlockEnding(currentScene);
    }
});

updateStartScreen();
</script>
